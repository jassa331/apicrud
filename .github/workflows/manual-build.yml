name: Professional CI/CD Pipeline

on:
  workflow_dispatch:

jobs:

  prepare:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

  setup-dotnet:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

  restore:
    needs: setup-dotnet
    runs-on: windows-latest
    steps:
      - name: Restore Dependencies
        run: dotnet restore **/*.csproj

  build:
    needs: restore
    runs-on: windows-latest
    steps:
      - name: Build Project
        run: dotnet build **/*.csproj --configuration Release --no-restore

  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Run Tests
        run: dotnet test **/*.csproj --no-build

  publish:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Publish Project
        run: dotnet publish **/*.csproj -c Release -o publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: published-app
          path: publish

  deploy:
    needs: publish
    runs-on: windows-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app

      - name: Start Application
        run: |
          Start-Process dotnet -ArgumentList "publish/apicrud.dll"

  health-check:
    needs: deploy
    runs-on: windows-latest
    steps:
      - name: Wait for App
        run: Start-Sleep -Seconds 15

      - name: Health Check
        run: |
          $response = Invoke-WebRequest http://serviceproazurefunction.runasp.net/health -UseBasicParsing
          if ($response.StatusCode -ne 200) {
            Write-Error "Health check failed"
            exit 1
          }
