name: Manual Build & Health Check

on:
  workflow_dispatch:

jobs:

  prepare:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


  setup-dotnet:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'


  restore:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Restore dependencies
        run: dotnet restore **/*.csproj


  build:
    needs: [setup-dotnet, restore]
    runs-on: windows-latest
    steps:
      - name: Build project
        run: dotnet build **/*.csproj --configuration Release


  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Run tests
        run: dotnet test **/*.csproj


  publish:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Publish project
        run: dotnet publish **/*.csproj -c Release -o publish


  deploy:
    needs: publish
    runs-on: windows-latest
    steps:
      - name: Run project (background)
        run: |
          Start-Process dotnet -ArgumentList "publish/apicrud.dll --urls=http://serviceproazurefunction.runasp.net/"

      - name: Wait for app to start
        run: Start-Sleep -Seconds 15


  health-check:
    needs: deploy
    runs-on: windows-latest
    steps:
      - name: Health Check (retry)
        run: |
          $maxRetries = 5
          $retryDelay = 5
          $success = $false

          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Attempt $i : Checking health..."
              $response = Invoke-WebRequest http://serviceproazurefunction.runasp.net/health -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check passed!"
                $success = $true
                break
              }
            } catch {
              Write-Host "Health check failed. Retrying in $retryDelay seconds..."
              Start-Sleep -Seconds $retryDelay
            }
          }

          if (-not $success) {
            Write-Error "Health check failed after multiple attempts."
            exit 1
          }
